<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border: 1px solid #ddd;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <h1>Leaderboard</h1>
    <table>
        <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Alice</td>
            <td>1500</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Bob</td>
            <td>1400</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Charlie</td>
            <td>1300</td>
        </tr>
        <tr>
            <td>4</td>
            <td>David</td>
            <td>1200</td>
        </tr>
        <tr>
            <td>5</td>
            <td>Eve</td>
            <td>1100</td>
        </tr>
    </table>
</body>
</html>
